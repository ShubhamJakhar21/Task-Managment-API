version: "3.9"

services:

  # PostgreSQL database
  db:
    image: postgres:15
    container_name: task_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # FastAPI application
  api:
    build: .
    container_name: task_api
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/taskdb
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data:
